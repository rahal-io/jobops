openapi: 3.1.0
info:
  title: jobops - Application Schemas
  version: 1.0.0
  x-domain: app
  description: Application pipeline, status, and follow-ups.
  license:
    name: MIT
    identifier: MIT
paths: {}
servers:
  - url: https://api.jobops.dev
components:
  schemas:
    ApplicationStatus:
      type: string
      enum: [Pending, Applied, Interviewing, Offered, Rejected, Withdrawn]
    Application:
      type: object
      required: [id, jobId, company, appliedDate, status]
      properties:
        id:
          type: string
        jobId:
          type: string
        company:
          type: string
        appliedDate:
          type: string
          format: date
        status:
          $ref: "#/components/schemas/ApplicationStatus"
        resumeId:
          type: string
        notes:
          type: string
    ApplicationListResponse:
      type: object
      properties:
        applications:
          type: array
          items:
            $ref: "#/components/schemas/Application"
    CreateApplicationRequest:
      type: object
      required: [jobId, resumeId, company]
      properties:
        jobId:
          type: string
        resumeId:
          type: string
        company:
          type: string
    StatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/ApplicationStatus"
    FollowUpRequest:
      type: object
      required: [applicationId, date]
      properties:
        applicationId:
          type: string
        date:
          type: string
          format: date
        note:
          type: string
    SubmitApplicationRequest:
      type: object
      required: [applicationId]
      properties:
        applicationId:
          type: string
