openapi: 3.1.0
info:
  title: jobops - Application Management
  version: 1.0.0
  x-domain: app
  x-cli-modes: [apply, pipeline, tracker, followup, batch]
  description: |
    Pipeline and application lifecycle: create applications, update status,
    schedule follow-ups, and execute form submission (apply).
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://api.jobops.dev
security:
  - bearerAuth: []
paths:
  /applications:
    get:
      operationId: ListApplications
      summary: List user applications (pipeline)
      tags: [Applications]
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Application list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: CreateApplication
      summary: Add a job to the pipeline
      tags: [Applications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApplicationRequest"
      responses:
        "201":
          description: Application created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /applications/{appId}/status:
    put:
      operationId: UpdateApplicationStatus
      summary: Update application status
      tags: [Applications]
      parameters:
        - $ref: "#/components/parameters/AppId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusUpdateRequest"
      responses:
        "200":
          description: Updated application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /applications/{appId}/submit:
    post:
      operationId: SubmitApplication
      summary: Auto-fill and submit application form
      tags: [Applications]
      parameters:
        - $ref: "#/components/parameters/AppId"
      responses:
        "202":
          description: Submission accepted (async)
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /applications/followups:
    post:
      operationId: ScheduleApplicationFollowUp
      summary: Schedule a follow-up for an application
      tags: [Applications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FollowUpRequest"
      responses:
        "202":
          description: Follow-up scheduled
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  schemas:
    Application:
      $ref: "application.schemas.yaml#/components/schemas/Application"
    ApplicationListResponse:
      $ref: "application.schemas.yaml#/components/schemas/ApplicationListResponse"
    CreateApplicationRequest:
      $ref: "application.schemas.yaml#/components/schemas/CreateApplicationRequest"
    StatusUpdateRequest:
      $ref: "application.schemas.yaml#/components/schemas/StatusUpdateRequest"
    FollowUpRequest:
      $ref: "application.schemas.yaml#/components/schemas/FollowUpRequest"
  parameters:
    AppId:
      $ref: "common/parameters.yaml#/components/parameters/AppId"
    Cursor:
      $ref: "common/parameters.yaml#/components/parameters/Cursor"
    Limit:
      $ref: "common/parameters.yaml#/components/parameters/Limit"
  securitySchemes:
    bearerAuth:
      $ref: "common/security.yaml#/components/securitySchemes/bearerAuth"
  responses:
    BadRequest:
      $ref: "common/responses.yaml#/components/responses/BadRequest"
    Unauthorized:
      $ref: "common/responses.yaml#/components/responses/Unauthorized"
    Forbidden:
      $ref: "common/responses.yaml#/components/responses/Forbidden"
    NotFound:
      $ref: "common/responses.yaml#/components/responses/NotFound"
