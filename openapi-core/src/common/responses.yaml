openapi: 3.1.0
info:
  title: jobops - Common Responses
  version: 1.0.0
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://api.jobops.dev
paths: {}
components:
  schemas:
    Problem:
      type: object
      description: RFC 7807-style problem details.
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        code:
          type: string
        traceId:
          type: string
  responses:
    BadRequest:
      description: Invalid request (400)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Authentication required (401)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: Insufficient permissions (403)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Resource not found (404)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Problem"
