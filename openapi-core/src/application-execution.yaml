openapi: 3.1.0
info:
  title: jobops - Application Execution
  version: 1.0.0
  x-domain: aex
  x-cli-modes: [apply]
  description: |
    Auto-fill and submit job application forms; tracks submission attempts
    and links back to pipeline applications by id.
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://api.jobops.dev
security:
  - bearerAuth: []
paths:
  /execution/submissions:
    get:
      operationId: ListApplicationSubmissions
      summary: List submissions, optionally filtered by application
      tags: [Execution]
      parameters:
        - name: applicationId
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Submissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationSubmissionListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: SubmitApplication
      summary: Auto-fill and submit an application form
      tags: [Execution]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitApplicationRequest"
      responses:
        "202":
          description: Submission accepted (async)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationSubmission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /execution/submissions/{submissionId}:
    get:
      operationId: GetApplicationSubmission
      summary: Get submission status and result
      tags: [Execution]
      parameters:
        - $ref: "#/components/parameters/SubmissionId"
      responses:
        "200":
          description: Submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationSubmission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /execution/submissions/{submissionId}/retry:
    post:
      operationId: RetryApplicationSubmission
      summary: Retry a failed submission
      tags: [Execution]
      parameters:
        - $ref: "#/components/parameters/SubmissionId"
      responses:
        "202":
          description: Retry accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationSubmission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
components:
  schemas:
    ApplicationSubmission:
      $ref: "application-execution.schemas.yaml#/components/schemas/ApplicationSubmission"
    ApplicationSubmissionListResponse:
      $ref: "application-execution.schemas.yaml#/components/schemas/ApplicationSubmissionListResponse"
    SubmitApplicationRequest:
      $ref: "application-execution.schemas.yaml#/components/schemas/SubmitApplicationRequest"
  parameters:
    SubmissionId:
      $ref: "common/parameters.yaml#/components/parameters/SubmissionId"
    Cursor:
      $ref: "common/parameters.yaml#/components/parameters/Cursor"
    Limit:
      $ref: "common/parameters.yaml#/components/parameters/Limit"
  securitySchemes:
    bearerAuth:
      $ref: "common/security.yaml#/components/securitySchemes/bearerAuth"
  responses:
    BadRequest:
      $ref: "common/responses.yaml#/components/responses/BadRequest"
    Unauthorized:
      $ref: "common/responses.yaml#/components/responses/Unauthorized"
    Forbidden:
      $ref: "common/responses.yaml#/components/responses/Forbidden"
    NotFound:
      $ref: "common/responses.yaml#/components/responses/NotFound"
